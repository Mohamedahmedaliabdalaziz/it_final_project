<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in — Luxury Garage</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="login.css">

</head>

<body class="bodylogin">



    <!-- LEFT DECORATIVE PANEL -->
    <div class="left-panel">
        <div class="bg-text">AUTO</div>

        <div class="brand-tagline">
            <h1>Luxury Garage</h1>
            <div class="divider-line"></div>
            <p>Explore the world of luxury cars</p>
        </div>
    </div>

    <!-- RIGHT FORM PANEL -->
    <div class="right-panel">
        <div class="form-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"
                />
                </svg>
            </div>
            Luxury Garage
        </div>
        <p class="form-subtitle">Your first platform for Car Details</p>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Log in</button>
            <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
        </div>

        <!-- Error message -->
        <div class="error-msg" id="errorMsg">There is a wrong try again!!</div>

        <!-- LOGIN PANEL -->
        <div class="panel active" id="loginPanel">
            <div class="input-group">
                <label>Email or Phone Number</label>
                <div class="input-wrapper">
                    <span class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
                    <input type="text" id="loginEmail" placeholder="example@mail.com" autocomplete="email" />
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
                    <input type="password" id="loginPassword" placeholder="••••••••" />
                    <button class="toggle-password" type="button" onclick="togglePass('loginPassword', this)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
                </div>
            </div>

            <div class="options-row">
                <label class="remember-me">
          <input type="checkbox" id="rememberMe"/> Stay logged in?
        </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button class="btn-submit" onclick="handleLogin()">
        <span class="btn-text">Enter</span>
        <div class="btn-loader"></div>
      </button>

            <div class="or-divider">أو</div>

            <button class="social-btn" onclick="handleSocial()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        login with Google
      </button>
        </div>

        <!-- REGISTER PANEL -->
        <div class="panel" id="registerPanel">
            <div class="input-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <span class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
                    <input type="text" id="regName" placeholder="محمد أحمد" />
                </div>
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <div class="input-wrapper">
                    <span class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </span>
                    <input type="email" id="regEmail" placeholder="example@mail.com" />
                </div>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <div class="input-wrapper">
                    <span class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.78a16 16 0 0 0 5.56 5.56l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.22 16z"/>
            </svg>
          </span>
                    <input type="tel" id="regPhone" placeholder="010xxxxxxxx" />
                </div>
            </div>

            <div class="input-group">
                <label> Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
                    <input type="password" id="regPassword" placeholder="••••••••" />
                    <button class="toggle-password" type="button" onclick="togglePass('regPassword', this)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
                </div>
            </div>

            <button class="btn-submit" onclick="handleRegister()" style="margin-top:8px">   
        <span class="btn-text">Create Account</span>
        <div class="btn-loader"></div>
      </button>
        </div>

        <p class="switch-mode" id="switchText">
            Don't have an account? <a href="#" onclick="switchTab('register'); return false;">Sign up now</a>
        </p>
    </div>
    <script src="login.js"></script>


</body>

</html>
